<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>账号商城 · 24h自动发号</title>
<meta name="description" content="账号自动发号系统，下单即发，免登录购买">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- ======== 公告 ======== -->
<div class="announce-bar"><div class="marquee"></div></div>

<!-- ======== 导航 ======== -->
<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo"><span class="dot"></span>账号商城</a>
    <div class="nav-links">
      <a href="orders.html">📋 <span>查订单</span></a>
      <a href="profile.html">👤 <span>我的</span></a>
    </div>
  </div>
</header>

<!-- ======== 搜索区 ======== -->
<section style="padding:20px 0 0">
  <div class="container">
    <div class="search-box">
      <input class="search-input" id="searchKeyword" type="text" placeholder="搜索账号关键词...">
      <button class="search-btn" onclick="applyFilters(getCurrentPlatform())">🔍 搜索</button>
    </div>

    <!-- 平台分类 -->
    <div class="platform-cats" id="platformCats"></div>
  </div>
</section>

<!-- ======== 商品列表 ======== -->
<section style="padding:20px 0 60px">
  <div class="container">
    <div class="section-header">
      <h3>全部商品</h3>
      <span style="font-size:12px;color:#94a3b8" id="productCountText">加载中...</span>
    </div>

    <div class="product-grid" id="productGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8">加载商品中...</div>
    </div>

    <div id="emptyTip" style="display:none;text-align:center;padding:60px 0;color:#94a3b8">
      <div style="font-size:44px;margin-bottom:10px">📭</div>
      <p style="font-size:13px">未找到匹配的账号</p>
    </div>

    <div class="pagination-wrapper">
      <span class="page-dot active">1</span>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 账号商城 · 24h自动发号 · <a href="#">用户协议</a> · <a href="#">隐私政策</a></p>
    <p class="service-wechat" data-label="客服微信" style="margin-top:4px">客服微信：kefu001</p>
  </div>
</footer>

<!-- 移动端 TabBar -->
<nav class="mobile-tabbar">
  <div class="tab-items">
    <button class="tab-item active" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
    </button>
    <button class="tab-item" onclick="location.href='orders.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/></svg>订单
    </button>
    <button class="tab-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>我的
    </button>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
$(function () {
  loadSiteConfig();
  $('#searchKeyword').on('keydown', function (e) { if (e.key === 'Enter') applyFilters(getCurrentPlatform()); });
});
</script>
</body>
</html>
