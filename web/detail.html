<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>商品详情 · 账号商城</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="announce-bar"><div class="marquee"></div></div>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo"><span class="dot"></span>账号商城</a>
    <div class="nav-links">
      <a href="orders.html">📋 <span>查订单</span></a>
      <a href="profile.html">👤 <span>我的</span></a>
    </div>
  </div>
</header>

<div class="breadcrumb">
  <div class="container">
    <a href="index.html">首页</a> / <span id="breadcrumbCat"></span> / 商品详情
  </div>
</div>

<main class="detail-main">
  <div class="container">
    <div class="detail-grid">

      <!-- 左侧：图片区域 -->
      <div class="detail-gallery">
        <div class="main-img" style="cursor:pointer" id="mainImgWrap">
          <img id="detailMainImg" src="" alt="" onclick="previewImage(this.src)">
        </div>
        <div class="thumb-list" id="thumbList"></div>
      </div>

      <!-- 右侧：信息 -->
      <div class="detail-info">
        <h1 class="title" id="detailTitle"></h1>

        <div class="price-row">
          <span class="price" id="detailPrice"></span>
          <span class="original" id="detailOrigPrice"></span>
          <span class="stock-tag" id="detailStock"></span>
        </div>

        <!-- 商品介绍 -->
        <div class="detail-section">
          <h4>📝 商品介绍</h4>
          <div class="content" id="detailDesc"></div>
        </div>

        <!-- 使用说明 -->
        <div class="detail-section">
          <h4>📖 使用说明</h4>
          <div class="content" id="detailUsage"></div>
        </div>

        <!-- 购买表单 -->
        <div class="buy-form-card" id="detailBuyForm">
          <h4>立即下单</h4>
          <div class="form-group">
            <label>手机号（必填，用于查询订单和发货通知）</label>
            <input class="form-control" type="tel" id="detailPhone" placeholder="输入手机号以便查询订单">
            <div class="form-hint">请填写手机号，下单后可通过手机号查询订单状态</div>
          </div>
          <div id="customFieldsArea" style="display:none"></div>
          <div class="form-group">
            <label>支付方式</label>
            <div class="pay-methods" id="detailPayMethods"></div>
          </div>
          <button class="btn-submit" id="btnDetailPay">确认支付</button>

          <!-- 二维码区域 -->
          <div class="qr-area" id="detailQRArea">
            <div class="qr-img" id="detailQRContainer"></div>
            <div class="countdown" id="detailCountdown">支付剩余 15:00</div>
            <button class="btn-paid" id="btnDetailPaid">✓ 已完成支付</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container"><p>© 2026 账号商城 · 24h自动发号</p></div>
</footer>

<nav class="mobile-tabbar">
  <div class="tab-items">
    <button class="tab-item" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
    </button>
    <button class="tab-item" onclick="location.href='orders.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/></svg>订单
    </button>
    <button class="tab-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>我的
    </button>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
$(function () {
  initAuth();

  var productId = parseInt(new URLSearchParams(location.search).get('id')) || 1;

  API.getProductDetail(productId).then(function (res) {
    if (!res || res.code !== 0 || !res.data) {
      $('.detail-main').html('<div class="container" style="text-align:center;padding:80px 0"><p style="font-size:44px">🔍</p><p style="color:#94a3b8">商品不存在</p><a href="index.html" style="color:#18a058">返回首页</a></div>');
      return;
    }
    var p = res.data;
    if (typeof p.images === 'string') {
      try { p.images = JSON.parse(p.images); } catch (e) { p.images = []; }
    }
    if (!p.images || !p.images.length) p.images = ['https://placehold.co/600x600/f1f5f9/94a3b8?text=N/A'];
    p.price = Number(p.price) || 0;
    p.original_price = Number(p.original_price) || 0;
    p.stock = Number(p.card_count > 0 ? (p.remain_stock !== undefined ? p.remain_stock : p.stock) : p.stock) || 0;

    document.title = p.title + ' · 账号商城';
    $('#breadcrumbCat').text(p.platform ? (function() {
      var map = {douyin:'某音',kuaishou:'某手',shipinhao:'某视频号',xiaohongshu:'某红薯',baijiahao:'某百家号'};
      return map[p.platform] || p.platform;
    })() : '全部');

    var images = p.images;
    $('#detailMainImg').attr('src', images[0]);
    var thumbHtml = '';
    images.forEach(function (img, i) {
      thumbHtml += '<div class="thumb-item' + (i === 0 ? ' active' : '') + '" onclick="event.stopPropagation();$(\'#detailMainImg\').attr(\'src\',\'' + img + '\');$(this).addClass(\'active\').siblings().removeClass(\'active\')"><img src="' + img + '" alt=""></div>';
    });
    $('#thumbList').html(thumbHtml);

    $('#detailTitle').text(p.title);
    $('#detailPrice').html('¥' + p.price.toFixed(2));
    $('#detailOrigPrice').text('¥' + p.original_price.toFixed(2));
    $('#detailStock').text('库存 ' + p.stock + ' 件');

    $('#detailDesc').text(p.description || '暂无介绍');
    $('#detailUsage').text(p.usage_guide || '暂无使用说明');

    $('#btnDetailPay').text('确认支付 ¥' + p.price.toFixed(2));

    $('#detailPayMethods').html(renderPayMethods('wechat'));

    // 根据登录状态调整手机号输入
    updatePhoneInput();

    // URL交付模式去掉手机号输入
    if (p.delivery_type === 'url') {
      $('#detailPhone').closest('.form-group').hide();
    }

    DetailBuy.init(p);
    renderCustomFields(p.custom_fields, '#customFieldsArea');

    API.getAnnouncements().then(function (res2) {
      var data = handleResponse(res2);
      if (data && data.length) {
        var texts = data.map(function (a) { return a.content; });
        $('.announce-bar .marquee').html(texts.concat(texts).map(function (t) { return '<span>' + t + '</span>'; }).join(''));
      }
    });
  }).fail(function () {
    $('.detail-main').html('<div class="container" style="text-align:center;padding:80px 0"><p style="font-size:44px">🔍</p><p style="color:#94a3b8">加载失败</p><a href="index.html" style="color:#18a058">返回首页</a></div>');
  });
});

function initAuth() {
  if (!Auth.isLoggedIn()) {
    $('.nav-links').html(
      '<a href="orders.html">📋 <span>查订单</span></a>'
      + '<a href="login.html">🔑 <span>登录/注册</span></a>'
    );
    return;
  }
  Auth.getProfile().then(function (res) {
    var data = handleResponse(res);
    if (data) {
      Auth.saveSession(Auth.getToken(), data);
      $('.nav-links').html(
        '<a href="orders.html">📋 <span>我的订单</span></a>'
        + '<span style="font-size:13px;color:var(--text-muted);cursor:pointer" onclick="location.href=\'profile.html\'">👤 ' + (data.nickname || data.phone) + '</span>'
        + '<a href="javascript:void(0)" onclick="handleLogout()" style="font-size:12px;color:#94a3b8">退出</a>'
      );
    } else {
      Auth.logout();
      $('.nav-links').html(
        '<a href="orders.html">📋 <span>查订单</span></a>'
        + '<a href="login.html">🔑 <span>登录/注册</span></a>'
      );
    }
    updatePhoneInput();
  }).fail(function () {
    $('.nav-links').html(
      '<a href="orders.html">📋 <span>查订单</span></a>'
      + '<a href="login.html">🔑 <span>登录/注册</span></a>'
    );
    updatePhoneInput();
  });
}

function updatePhoneInput() {
  if (Auth.isLoggedIn()) {
    var user = Auth.getUser();
    $('#detailPhone').closest('.form-group').html(
      '<label>已登录：' + (user ? user.phone : '') + '</label>'
      + '<input type="hidden" id="detailPhone" value="' + (user ? user.phone : '') + '">'
      + '<div class="form-hint">下单将自动关联您的账户手机号</div>'
    );
  }
}
</script>
</body>
</html>
