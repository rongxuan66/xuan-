<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的 · 账号商城</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="announce-bar"><div class="marquee"></div></div>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="logo"><span class="dot"></span>账号商城</a>
    <div class="nav-links">
      <a href="orders.html">📋 <span>订单</span></a>
      <a href="profile.html" class="active">👤 <span>我的</span></a>
    </div>
  </div>
</header>

<section class="profile-page">
  <div class="container">

    <div class="profile-header">
      <div class="avatar">👤</div>
      <div style="font-size:15px;font-weight:700;color:#111827">游客用户</div>
      <div style="font-size:12px;color:#94a3b8;margin-top:3px">免登录模式 · 基于浏览器缓存</div>
    </div>

    <div class="profile-menu">
      <div class="menu-item" onclick="location.href='orders.html'">
        <div class="left">
          <div class="icon" style="background:rgba(24,160,88,0.08)">📋</div>
          <span>全部订单</span>
        </div>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item" onclick="showMyOrders()">
        <div class="left">
          <div class="icon" style="background:rgba(24,160,88,0.08)">📦</div>
          <span>已购账号</span>
        </div>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item" onclick="exportOrders()">
        <div class="left">
          <div class="icon" style="background:rgba(24,160,88,0.08)">📤</div>
          <span>导出记录</span>
        </div>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <div class="left">
          <div class="icon" style="background:rgba(24,160,88,0.08)">💬</div>
          <span>联系客服</span>
        </div>
        <span class="service-wechat" data-label="微信" style="font-size:12px;color:#18a058">微信：kefu001</span>
      </div>
      <div class="menu-item" onclick="refreshAllOrders()">
        <div class="left">
          <div class="icon" style="background:rgba(24,160,88,0.08)">🔄</div>
          <span>刷新订单状态</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </div>

    <!-- 最近订单 -->
    <div style="max-width:460px;margin:24px auto 0">
      <div class="section-header"><h3>最近订单</h3></div>
      <div id="recentOrderList">
        <div style="text-align:center;padding:28px;color:#94a3b8;font-size:13px">
          暂无订单<br><a href="index.html" style="color:#18a058">去逛逛 →</a>
        </div>
      </div>
    </div>

  </div>
</section>

<footer class="site-footer">
  <div class="container"><p>© 2026 账号商城</p></div>
</footer>

<nav class="mobile-tabbar">
  <div class="tab-items">
    <button class="tab-item" onclick="location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
    </button>
    <button class="tab-item" onclick="location.href='orders.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/></svg>订单
    </button>
    <button class="tab-item active" onclick="location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>我的
    </button>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
$(function () {
  loadSiteConfig();
  initAuth();
  // 公告
  API.getAnnouncements().then(function (res) {
    var data = handleResponse(res);
    if (data && data.length) {
      var texts = data.map(function (a) { return a.content; });
      $('.announce-bar .marquee').html(texts.concat(texts).map(function (t) { return '<span>' + t + '</span>'; }).join(''));
    }
  });
  renderOrders();
});

function initAuth() {
  if (!Auth.isLoggedIn()) {
    renderProfileGuest();
    return;
  }
  Auth.getProfile().then(function (res) {
    var data = handleResponse(res);
    if (data) {
      Auth.saveSession(Auth.getToken(), data);
      renderProfileUser(data);
    } else {
      Auth.logout();
      renderProfileGuest();
    }
  }).fail(function () {
    renderProfileGuest();
  });
}

function renderProfileGuest() {
  $('.nav-links').html(
    '<a href="orders.html">📋 <span>查订单</span></a>'
    + '<a href="login.html">🔑 <span>登录/注册</span></a>'
  );
  $('.profile-header').html(
    '<div class="avatar">👤</div>'
    + '<div style="font-size:15px;font-weight:700;color:#111827">游客用户</div>'
    + '<div style="font-size:12px;color:#94a3b8;margin-top:3px">免登录模式 · 基于浏览器缓存</div>'
  );
}

function renderProfileUser(user) {
  $('.nav-links').html(
    '<a href="orders.html">📋 <span>我的订单</span></a>'
    + '<span style="font-size:13px;color:var(--text-muted);cursor:pointer" onclick="location.href=\'profile.html\'">👤 ' + (user.nickname || user.phone) + '</span>'
    + '<a href="javascript:void(0)" onclick="handleLogout()" style="font-size:12px;color:#94a3b8">退出</a>'
  );
  $('.profile-header').html(
    '<div class="avatar">👤</div>'
    + '<div style="font-size:15px;font-weight:700;color:#111827">' + (user.nickname || user.phone) + '</div>'
    + '<div style="font-size:12px;color:#94a3b8;margin-top:3px">已登录 · ' + user.phone + '</div>'
    + '<div style="font-size:12px;color:#94a3b8;margin-top:2px">累计 ' + (user.total_orders || 0) + ' 单 · 消费 ¥' + Number(user.total_amount || 0).toFixed(2) + '</div>'
  );
  // 从API加载我的订单
  Auth.getMyOrders({ page: 1, pageSize: 50 }).then(function (res) {
    var data = handleResponse(res);
    if (data && data.list) {
      renderOrderListFromApi(data.list);
    }
  });
}

function renderOrders() {
  var orders = OrderStore.getAll();
  var $list = $('#recentOrderList');
  if (!orders.length) {
    $list.html('<div style="text-align:center;padding:28px;color:#94a3b8;font-size:13px">暂无订单<br><a href="index.html" style="color:#18a058">去逛逛 →</a></div>');
    return;
  }
  $list.html(orders.slice(0, 10).map(function (o) {
    var statusTag = '';
    if (o.status === 'paid') statusTag = '<span style="color:#16a34a;font-size:10px;font-weight:600">✓ 已支付</span>';
    else if (o.status === 'refunded') statusTag = '<span style="color:#64748b;font-size:10px;font-weight:600">已退款</span>';
    else statusTag = '<span style="color:#e67e22;font-size:10px;font-weight:600">⏳ 待支付</span>';
    return '<div class="order-mini-card" onclick="location.href=\'order-detail.html?no=' + o.orderNo + '\'" style="cursor:pointer">'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:58%">' + o.productTitle + '</span>'
      + '<span style="font-size:16px;font-weight:800;color:#ef4444">¥' + Number(o.price).toFixed(2) + '</span></div>'
      + '<div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#94a3b8">'
      + '<span>' + o.orderNo + '</span>' + statusTag + '</div>'
      + '<div style="display:flex;justify-content:space-between;margin-top:2px;font-size:11px;color:#94a3b8">'
      + '<span>' + o.createdAt + '</span></div>'
      + (o.account ? '<div style="margin-top:7px;font-size:12px;background:rgba(255,255,255,0.5);padding:8px 12px;border-radius:8px;display:flex;justify-content:space-between">'
      + '<span>账号：<b>' + o.account + '</b></span>'
      + '<button onclick="event.stopPropagation();copySingle(\'' + o.account + '\\n密码：' + o.password + '\')" style="background:none;border:none;cursor:pointer;font-size:12px;color:#18a058">📋 复制</button>'
      + '</div>' : '')
      + '</div>';
  }).join(''));
}

function renderOrderListFromApi(orders) {
  var $list = $('#recentOrderList');
  if (!orders.length) {
    $list.html('<div style="text-align:center;padding:28px;color:#94a3b8;font-size:13px">暂无订单<br><a href="index.html" style="color:#18a058">去逛逛 →</a></div>');
    return;
  }
  $list.html(orders.map(function (o) {
    var statusTag = '';
    if (o.status === 'paid') statusTag = '<span style="color:#16a34a;font-size:10px;font-weight:600">✓ 已支付</span>';
    else if (o.status === 'refunded') statusTag = '<span style="color:#64748b;font-size:10px;font-weight:600">已退款</span>';
    else statusTag = '<span style="color:#e67e22;font-size:10px;font-weight:600">⏳ 待支付</span>';
    return '<div class="order-mini-card" onclick="location.href=\'order-detail.html?no=' + o.order_no + '\'" style="cursor:pointer">'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:58%">' + o.product_title + '</span>'
      + '<span style="font-size:16px;font-weight:800;color:#ef4444">¥' + Number(o.price).toFixed(2) + '</span></div>'
      + '<div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#94a3b8">'
      + '<span>' + o.order_no + '</span>' + statusTag + '</div>'
      + '<div style="display:flex;justify-content:space-between;margin-top:2px;font-size:11px;color:#94a3b8">'
      + '<span>' + (o.created_at || '') + '</span></div>'
      + (o.account ? '<div style="margin-top:7px;font-size:12px;background:rgba(255,255,255,0.5);padding:8px 12px;border-radius:8px;display:flex;justify-content:space-between">'
      + '<span>账号：<b>' + o.account + '</b></span>'
      + '<button onclick="event.stopPropagation();copySingle(\'' + o.account + '\\n密码：' + o.password + '\')" style="background:none;border:none;cursor:pointer;font-size:12px;color:#18a058">📋 复制</button>'
      + '</div>' : '')
      + '</div>';
  }).join(''));
}

function showMyOrders() { location.href = 'orders.html'; }

function refreshAllOrders() {
  var orders = OrderStore.getAll();
  if (!orders.length) { toast('暂无订单可刷新'); return; }
  toast('正在刷新 ' + orders.length + ' 条订单状态...');
  var pending = 0;
  orders.forEach(function (order) {
    if (order.status !== 'paid') {
      pending++;
      API.getPaymentStatus(order.orderNo).then(function (res) {
        if (res && res.code === 0 && res.data && res.data.status === 'paid') {
          order.status = 'paid';
          API.getOrder(order.orderNo).then(function (res2) {
            if (res2 && res2.code === 0 && res2.data) {
              order.account = res2.data.account || '';
              order.password = res2.data.password || '';
            }
            localStorage.setItem('red_orders', JSON.stringify(orders));
            renderOrders();
          });
        }
        pending--;
        if (pending <= 0) {
          localStorage.setItem('red_orders', JSON.stringify(orders));
          renderOrders();
        }
      }).fail(function () { pending--; });
    }
  });
  if (pending === 0) toast('所有订单状态已是最新');
}

function exportOrders() {
  var orders = OrderStore.getAll();
  if (!orders.length) {
    toast('暂无记录可导出');
    return;
  }
  var text = orders.map(function (o) {
    return '【' + o.productTitle + '】\n订单号：' + o.orderNo + '\n账号：' + (o.account || '未发放') + '\n密码：' + (o.password || '-') + '\n状态：' + o.status + '\n';
  }).join('\n---\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function () {
      toast('已复制全部记录');
    });
  }
}

function copySingle(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function () {
      toast('已复制');
    });
  }
}

function handleLogout() {
  Auth.logout();
  toast('已退出登录');
  location.href = 'index.html';
}
</script>
</body>
</html>
