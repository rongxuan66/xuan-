<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>登录/注册 · 账号商城</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: #f8fafc; }
.auth-card { background: #fff; border-radius: 16px; padding: 40px 32px 32px; width: 100%; max-width: 400px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04); }
.auth-card h3 { font-size: 20px; font-weight: 800; color: #111827; text-align: center; margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-radius: 10px; background: #f1f5f9; padding: 4px; }
.auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #64748b; cursor: pointer; transition: all .2s; border: none; background: transparent; }
.auth-tab.active { background: #fff; color: #111827; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.form-group-auth { margin-bottom: 16px; }
.form-group-auth label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
.form-group-auth input { width: 100%; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; color: #111827; outline: none; transition: border .2s; box-sizing: border-box; }
.form-group-auth input:focus { border-color: #18a058; }
.auth-btn { width: 100%; padding: 12px; background: #111827; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .2s; }
.auth-btn:hover { background: #000; }
.auth-btn:disabled { opacity: .5; cursor: not-allowed; }
.auth-link { text-align: center; margin-top: 18px; font-size: 13px; color: #94a3b8; }
.auth-link a { color: #18a058; font-weight: 600; }
.auth-err { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
#nicknameGroup { display: none; }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <h3>账号商城</h3>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <form id="authForm" onsubmit="return false;">
      <div class="form-group-auth">
        <label>手机号</label>
        <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11" autocomplete="tel">
        <div class="auth-err" id="phoneErr"></div>
      </div>

      <div class="form-group-auth">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码（至少6位）" autocomplete="current-password">
        <div class="auth-err" id="passErr"></div>
      </div>

      <div class="form-group-auth" id="nicknameGroup">
        <label>昵称（选填）</label>
        <input type="text" id="nickname" placeholder="给自己取个昵称" maxlength="20">
      </div>

      <button class="auth-btn" id="submitBtn" onclick="handleSubmit()">登录</button>
    </form>

    <div class="auth-link">
      <span id="switchText">还没有账号？</span>
      <a href="javascript:void(0)" id="switchLink" onclick="switchTab('register')">立即注册</a>
    </div>

    <div style="text-align:center;margin-top:14px">
      <a href="index.html" style="font-size:12px;color:#94a3b8">← 返回首页</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
var mode = 'login';

function switchTab(tab) {
  mode = tab;
  $('#tabLogin').toggleClass('active', tab === 'login');
  $('#tabRegister').toggleClass('active', tab === 'register');
  $('#nicknameGroup').toggle(tab === 'register');
  $('#submitBtn').text(tab === 'login' ? '登录' : '注册');
  $('#switchText').text(tab === 'login' ? '还没有账号？' : '已有账号？');
  $('#switchLink').text(tab === 'login' ? '立即注册' : '去登录');
  $('#switchLink').attr('onclick', tab === 'login' ? "switchTab('register')" : "switchTab('login')");
  clearErrors();
}

function showError(id, msg) {
  $('#' + id).text(msg).show();
}

function clearErrors() {
  $('.auth-err').hide().text('');
}

function handleSubmit() {
  clearErrors();
  var phone = $('#phone').val().trim();
  var password = $('#password').val();
  var nickname = $('#nickname').val().trim();

  var hasErr = false;
  if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
    showError('phoneErr', '请输入有效的11位手机号');
    hasErr = true;
  }
  if (!password || password.length < 6) {
    showError('passErr', '密码至少6位');
    hasErr = true;
  }
  if (hasErr) return;

  var btn = $('#submitBtn');
  btn.prop('disabled', true).text(mode === 'login' ? '登录中...' : '注册中...');

  var apiCall = mode === 'login'
    ? Auth.login(phone, password)
    : Auth.register(phone, password, nickname);

  apiCall.then(function (res) {
    if (res && res.code === 0 && res.data) {
      Auth.saveSession(res.data.token, res.data.user);
      toast(mode === 'login' ? '登录成功' : '注册成功');
      setTimeout(function () {
        var redirect = new URLSearchParams(location.search).get('redirect');
        location.href = redirect || 'index.html';
      }, 600);
    } else {
      var msg = (res && res.message) || '操作失败';
      showError('phoneErr', msg);
      btn.prop('disabled', false).text(mode === 'login' ? '登录' : '注册');
    }
  }).fail(function () {
    showError('phoneErr', '网络错误，请重试');
    btn.prop('disabled', false).text(mode === 'login' ? '登录' : '注册');
  });
}

// Enter key submit
$(function () {
  $('#password').on('keydown', function (e) {
    if (e.key === 'Enter') handleSubmit();
  });
});
</script>
</body>
</html>
